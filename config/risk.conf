# OMS Risk Configuration
# Bloomberg-style flat config: key=value, # for comments
# Loaded at startup by RiskConfig::loadFromFile()

# Maximum notional value per single order (USD)
max_order_notional=5000000

# Maximum gross position notional per symbol (USD)
max_position_notional=50000000

# Maximum daily realized loss before kill-switch (USD, negative)
max_daily_loss=-1000000

# Maximum shares per single order
max_order_qty=500000

# Maximum number of simultaneously open orders
max_open_orders=500
